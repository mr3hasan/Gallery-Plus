name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: |
          npm run build -- --base=./ || npm run build || true
          if [ ! -d "dist" ]; then
            mkdir -p dist
            cp index.html dist/ 2>/dev/null || true
          fi

      - name: Setup Capacitor Config
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.ec1234.app",
            "appName": "Gallery Plus",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "hostname": "localhost",
              "cleartext": true
            }
          }
          EOF
          npx cap add android || true
          npx cap sync android

      - name: Fix Gradle Version
        run: |
          cd android
          sed -i 's|gradle-.*-all.zip|gradle-8.13-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          # Download a fresh, uncorrupted official Gradle Wrapper JAR directly from Gradle's repository
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.13.0/gradle/wrapper/gradle-wrapper.jar
          # Ensure gradlew uses Unix line endings and is fully executable
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build Android APK
        run: |
          cd android
          echo "configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                      details.useVersion '1.8.22'
                  }
              }
          }" >> app/build.gradle
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
